slam_toolbox:
  ros__parameters:
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    use_scan_matching: true
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05

    resolution: 0.05
    max_laser_range: 3.0

    transform_publish_period: 0.02
    map_update_interval: 1.0
    enable_interactive_mode: true
